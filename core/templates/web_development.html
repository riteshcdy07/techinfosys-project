    <script>
        function filterTech(category, element) {
            const items = document.querySelectorAll('.tech-item');
            const tabs = document.querySelectorAll('.tech-tab');
        
            // 1. Update Active Tab UI
            tabs.forEach(tab => {
                tab.classList.remove('text-green-500');
                tab.classList.add('text-gray-400');
            });
            element.classList.add('text-green-500');
            element.classList.remove('text-gray-400');
        
            // 2. Filter Logos based on Category
            items.forEach(item => {
                const itemCat = item.getAttribute('data-category');
                if (itemCat === category) {
                    item.style.display = 'block';
                    setTimeout(() => { item.style.opacity = '1'; }, 10);
                } else {
                    item.style.opacity = '0';
                    setTimeout(() => { item.style.display = 'none'; }, 300);
                }
            });
        }
        
        // Set Web Development as default on load
        document.addEventListener('DOMContentLoaded', () => {
            const firstTab = document.querySelector('.tech-tab');
            if(firstTab) filterTech('Web Development', firstTab);
        });
        </script>
